name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          buildozer_version: '1.5.0'
          python_version: '3.10'
          command: cd swt-android-app && buildozer android debug
          android_api: '31'
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swt-apk
          path: swt-android-app/bin/*.apk