name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download Android NDK r21e
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip -d $HOME/android-ndk
          echo "ANDROIDNDK=$HOME/android-ndk/android-ndk-r21e" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libffi-dev libssl-dev libbz2-dev libsqlite3-dev \
            libncurses5-dev libgdbm-dev liblzma-dev uuid-dev zlib1g-dev
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer
      
      - name: Build APK
        working-directory: swt-android-app
        env:
          BUILDOZER_LOG_LEVEL: "2"
        run: |
          set -euo pipefail
          export LANG=C.UTF-8
          buildozer android debug & build_pid=$!
          echo "buildozer pid=$build_pid"
          while kill -0 "$build_pid" 2>/dev/null; do
            find_paths=()
            mapfile -t find_paths < <(find $HOME/.buildozer $PWD/.buildozer 2>/dev/null || true)
            for base in "${find_paths[@]}"; do
              find "$base" -type f -path '*python3*/Lib/test/badsyntax_pep3120.py' -exec bash -c 'echo "Removing {}"; rm -f "{}"' \; 2>/dev/null || true
              find "$base" -type f -path '*python3*/Lib/test/*.py' -name 'badsyntax_*.py' -exec bash -c 'echo "Removing {}"; rm -f "{}"' \; 2>/dev/null || true
            done
            sleep 2
          done
          wait "$build_pid"
          chmod +x ./.buildozer/android/platform/build-arm64-v8a/dists/swt_system/gradlew 2>/dev/null || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swt-apk
          path: swt-android-app/bin/*.apk