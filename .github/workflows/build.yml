name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prevent EOL conversions
        run: |
          git config --global core.eol lf
          git config --global core.autocrlf false

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv /tmp/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/" || true
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          chmod +x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin:$PATH" >> $GITHUB_ENV
          yes | "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;21.4.7075529"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libffi-dev libssl-dev libbz2-dev libsqlite3-dev \
            libncurses5-dev libgdbm-dev liblzma-dev uuid-dev zlib1g-dev \
            git patch unzip zip
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Install helper tools and Gradle fallback
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix unzip
          GRADLE_VERSION=8.0.2
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -P /tmp
          sudo unzip -q -d /opt/gradle /tmp/gradle-${GRADLE_VERSION}-bin.zip
          echo "/opt/gradle/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      - name: Build APK
        working-directory: swt-android-app
        run: |
          set -euo pipefail

          export ANDROID_NDK_HOME="$HOME/.buildozer/android/platform/android-sdk/ndk/21.4.7075529"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          export ANDROIDNDK="$ANDROID_NDK_HOME"
          export P4A_NDK_PATH="$ANDROID_NDK_HOME"

          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

          rm -rf venv .venv env || true

          ( while :; do
              find ./.buildozer -type d -path "*/python3/*/Lib/test" -exec rm -rf {} + 2>/dev/null || true
              find ./.buildozer -type f -name "badsyntax_pep3120.py" -delete 2>/dev/null || true
              sleep 0.5
            done ) & CLEANER_PID=$!

          BUILD_EXIT=0
          buildozer android debug --verbose 2>&1 | tee buildozer-full.log || BUILD_EXIT=$?

          if [ "${BUILD_EXIT}" -ne 0 ]; then
            echo "buildozer failed with exit ${BUILD_EXIT}"
            tail -n 300 buildozer-full.log || true

            find ./.buildozer -type f -name gradlew -print0 | while IFS= read -r -d '' g; do
              echo "Fixing gradlew at: $g"
              if command -v dos2unix >/dev/null 2>&1; then
                dos2unix "$g" || true
              else
                sed -i 's/\r$//' "$g" || true
              fi
              chmod +x "$g" || true

              dist_dir="$(dirname "$g")"
              (cd "$dist_dir" && ./gradlew assembleDebug --no-daemon) || true
            done

            find ./.buildozer -type d -path "*/dists/*" -print0 | while IFS= read -r -d '' d; do
              if command -v gradle >/dev/null 2>&1; then
                (cd "$d" && gradle assembleDebug --no-daemon) || true
              fi
            done

            kill "$CLEANER_PID" 2>/dev/null || true
            wait "$CLEANER_PID" 2>/dev/null || true

            exit "${BUILD_EXIT}"
          fi

          kill "$CLEANER_PID" 2>/dev/null || true
          wait "$CLEANER_PID" 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swt-apk
          path: swt-android-app/bin/*.apk
