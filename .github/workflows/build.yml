name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtinfo5 libtinfo6 ncurses-base || true
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.10'
          work-dir: 'swt-android-app'
          buildozer-cmd: 'buildozer android debug'
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swt-apk
          path: swt-android-app/bin/*.apk