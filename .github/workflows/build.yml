name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Android SDK
        run: |
          ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv /tmp/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/" || true

          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          chmod +x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin:$PATH" >> $GITHUB_ENV

          yes | "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
      
      - name: Download Android NDK r21e
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip -d $HOME/android-ndk
          echo "ANDROIDNDK=$HOME/android-ndk/android-ndk-r21e" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r21e" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libffi-dev libssl-dev libbz2-dev libsqlite3-dev \
            libncurses5-dev libgdbm-dev liblzma-dev uuid-dev zlib1g-dev
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer==1.5.0
      
      - name: Ensure UTF-8 locale
        run: |
          echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
          echo "LANG=C.UTF-8" >> $GITHUB_ENV
      
      - name: Build APK
        working-directory: swt-android-app
        run: |
          set -e
          buildozer android debug --verbose || {
            echo "Build failed, patching CPython test files..."
            for p in $(find . -type f -path "./.buildozer/**/python3/Lib/test/badsyntax_pep3120.py" 2>/dev/null || true); do
              python3 - <<'PY'
import pathlib, sys
p = pathlib.Path(sys.argv[1])
data = p.read_bytes()
try:
    data.decode('utf-8')
except UnicodeDecodeError:
    text = data.decode('latin-1')
    p.write_text('# -*- coding: latin-1 -*-\n' + text, encoding='utf-8')
PY
            done
            buildozer android debug --verbose
          }
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swt-apk
          path: swt-android-app/bin/*.apk